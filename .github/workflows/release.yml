name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0) — used only for manual runs'
        required: true

permissions:
  contents: write

jobs:
  build-release:
    name: Build + package + publish
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Resolve release tag
        id: tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ github.event.inputs.tag }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }
          if ($tag -notmatch '^v\d+\.\d+\.\d+') {
            throw "Tag '$tag' must match v<major>.<minor>.<patch>"
          }
          $version = $tag.Substring(1)
          "tag=$tag"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "tag=$tag, version=$version"

      - name: Configure (Release)
        run: cmake --preset msvc-x64-release

      - name: Build
        run: cmake --build --preset release

      - name: Run unit tests
        working-directory: build
        run: ctest --output-on-failure --no-tests=error

      - name: Verify embedded VERSIONINFO matches tag
        shell: pwsh
        run: |
          $expected = "${{ steps.tag.outputs.version }}.0"
          $actual   = (Get-Item build/FastExplorer.exe).VersionInfo.ProductVersion
          Write-Host "expected=$expected actual=$actual"
          if ($actual -ne $expected) {
            throw "VERSIONINFO ($actual) does not match tag ($expected) — bump project(VERSION ...) in CMakeLists.txt before tagging."
          }

      - name: Package (CPack ZIP)
        run: cmake --build --preset release --target package

      - name: Upload artifact (CI archive)
        uses: actions/upload-artifact@v4
        with:
          name: FastExplorer-${{ steps.tag.outputs.version }}-win64
          path: build/FastExplorer-${{ steps.tag.outputs.version }}-win64.zip
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: build/FastExplorer-${{ steps.tag.outputs.version }}-win64.zip
          fail_on_unmatched_files: true

      # ---- appcast update + gh-pages publish -----------------------------
      # Skipped (with a notice, not a failure) if ED25519_PRIVATE_KEY secret
      # is not set — the release still publishes, just without auto-update.
      - name: Check for Ed25519 secret
        id: have_key
        shell: pwsh
        env:
          KEY: ${{ secrets.ED25519_PRIVATE_KEY }}
        run: |
          if ([string]::IsNullOrEmpty($env:KEY)) {
            Write-Host "::notice::ED25519_PRIVATE_KEY secret not set — skipping appcast update."
            "present=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "present=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Set up Python
        if: steps.have_key.outputs.present == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyNaCl
        if: steps.have_key.outputs.present == 'true'
        run: pip install pynacl

      - name: Sign release ZIP and update appcast.xml
        if: steps.have_key.outputs.present == 'true'
        env:
          ED25519_PRIVATE_KEY: ${{ secrets.ED25519_PRIVATE_KEY }}
        run: |
          python scripts/release-appcast.py publish `
            --zip "build/FastExplorer-${{ steps.tag.outputs.version }}-win64.zip" `
            --version "${{ steps.tag.outputs.version }}" `
            --url "https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/FastExplorer-${{ steps.tag.outputs.version }}-win64.zip" `
            --appcast "appcast/appcast.xml" `
            --priv-key "$env:ED25519_PRIVATE_KEY"

      - name: Commit appcast back to main
        if: steps.have_key.outputs.present == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add appcast/appcast.xml
          git commit -m "chore(appcast): publish ${{ steps.tag.outputs.tag }}"
          git push origin HEAD:main

      - name: Publish appcast to gh-pages
        if: steps.have_key.outputs.present == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./appcast
          publish_branch: gh-pages
          keep_files: true
          commit_message: "publish appcast for ${{ steps.tag.outputs.tag }}"
